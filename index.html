<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome To My Website</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Poppins,sans-serif;
}

body{
    background:#fff;
    overflow-x:hidden;
}

.hero{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:70px 6%;
}

.left{
    width:45%;
}

.left h2{
    font-size:70px;
    font-weight:800;
    color:#081336;
}

.left h1{
    font-size:90px;
    font-weight:900;
    background:linear-gradient(180deg,#8248ff,#5320e6);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.left p{
    margin-top:30px;
    font-size:22px;
    line-height:1.8;
    color:#222;
}

.buttons{
    display:flex;
    gap:20px;
    margin-top:40px;
}

.btn{
    text-decoration:none;
    padding:18px 35px;
    border-radius:14px;
    font-weight:600;
    display:flex;
    align-items:center;
    gap:10px;
}

.instagram{
    background:#5f2eff;
    color:white;
}

.contact{
    border:2px solid #d5c8ff;
    color:#5f2eff;
}

.right{
    width:50%;
    height:700px;
    position:relative;
}

.blob{
    position:absolute;
    border-radius:50%;
}

.blob1{
    width:500px;
    height:500px;
    background:rgba(116,81,255,.25);
    top:100px;
    left:50px;
}

.blob2{
    width:300px;
    height:300px;
    background:rgba(116,81,255,.2);
    top:20px;
    right:0;
}

.computer{
    position:absolute;
    width:700px;
    right:0;
    top:20px;
    z-index:2;
}

.mobile{
    position:absolute;
    width:180px;
    right:40px;
    bottom:90px;
    z-index:3;
}

.pencil{
    position:absolute;
    width:170px;
    left:90px;
    bottom:100px;
    z-index:3;
}

.mug{
    position:absolute;
    width:170px;
    right:-20px;
    bottom:20px;
    z-index:3;
}

.scroll{
    margin-top:50px;
}

.scroll button{
    width:55px;
    height:55px;
    border-radius:50%;
    border:1px solid #ddd;
    background:white;
    cursor:pointer;
}

@media(max-width:991px){

.hero{
    flex-direction:column;
    text-align:center;
}

.left,
.right{
    width:100%;
}

.left h2{
    font-size:45px;
}

.left h1{
    font-size:60px;
}

.buttons{
    justify-content:center;
}

}

</style>
</head>
<body>

<section class="hero">

<div class="left">

<h2>WELCOME TO</h2>
<h1>MY WEBSITE</h1>

<p>
Halo Sobat, Kami melayani Jasa Desain Grafis dan
Pembuatan Website loh. Layanan apa saja sih yang kami
tawarkan, coba sobat geser ke bawah!
</p>

<div class="buttons">

<a href="#" class="btn instagram">
<i class="fab fa-instagram"></i>
DM Instagram
</a>

<a href="#" class="btn contact">
<i class="fas fa-phone"></i>
Hubungi Kami
</a>

</div>

<div class="scroll">
<button onclick="scrollPage()">
<i class="fas fa-arrow-down"></i>
</button>
</div>

</div>

<div class="right">

<div class="blob blob1"></div>
<div class="blob blob2"></div>

<img src="assets/computer.png" class="computer">
<img src="assets/mobile.png" class="mobile">
<img src="assets/pencil.png" class="pencil">
<img src="assets/mug.png" class="mug">

</div>

</section>

<script>

function scrollPage(){
    window.scrollTo({
        top: window.innerHeight,
        behavior:'smooth'
    });
}
    <section class="services">

    <div class="services-text">

        <h2>Jasa Desain Grafis Profesional</h2>

        <p>
            Kami melayani jasa desain grafis nih Sobat!
            Buat Sobat yang lagi punya usaha atau lagi
            bingung mau bikin desain brosur, banner,
            poster, dan kebutuhan desain lainnya,
            semuanya bisa banget pesan di ANCreative.
        </p>

        <div class="line"></div>

    </div>

    <div class="services-grid">

        <div class="card">
            <div class="icon purple">
                <i class="fas fa-newspaper"></i>
            </div>
            <h3>Brosur</h3>
            <span class="underline purple-bg"></span>
        </div>

        <div class="card">
            <div class="icon pink">
                <i class="fas fa-image"></i>
            </div>
            <h3>Banner</h3>
            <span class="underline pink-bg"></span>
        </div>

        <div class="card">
            <div class="icon orange">
                <i class="fas fa-file-image"></i>
            </div>
            <h3>Poster</h3>
            <span class="underline orange-bg"></span>
        </div>

        <div class="card">
            <div class="icon green">
                <i class="fas fa-clipboard-list"></i>
            </div>
            <h3>Konten<br>Sosial Media</h3>
            <span class="underline green-bg"></span>
        </div>

        <div class="card">
            <div class="icon blue">
                <i class="fas fa-user"></i>
            </div>
            <h3>Dan kebutuhan<br>desain lainnya</h3>
            <span class="underline blue-bg"></span>
        </div>

    </div>

</section>

</script>

</body>
</html>
